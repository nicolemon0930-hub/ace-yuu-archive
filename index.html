<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Ace & Yuu Archive V3</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Ace & Yuu Archive</h2>

    <button onclick="setMode('all')">♥️📷 共演</button>
    <button onclick="setMode('ace')">♥️ Ace</button>
    <button onclick="setMode('yuu')">📷 Yuu</button>
    <button onclick="toggleTimeline()">Timeline</button>

    <hr/>

    <button onclick="exportJSON()">Export JSON</button>
    <input type="file" onchange="importJSON(event)" />
  </aside>

  <!-- Main -->
  <main class="main">

    <header class="topbar">
      <div>
        <h1>Ace & Yuu Archive</h1>
        <p class="subtitle">An Archive of Stories, Memories and Bonds.</p>
      </div>

      <input id="search" placeholder="搜索..." oninput="render()" />
      <button onclick="addRecord()">+ 新增记录</button>
    </header>

    <section id="list"></section>
    <section id="timeline" style="display:none;"></section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
