<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive 2.0</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="archive-header">

    <h1>ACE & YUU ARCHIVE</h1>

    <div class="toolbar">
        <input id="searchInput" placeholder="Search...">
        <button id="btnNew">+ New Record</button>
    </div>

</header>

<div class="main-container">

    <aside class="sidebar">
        <ul id="categoryFilter">
            <li data-val="Both" class="active">All</li>
            <li data-val="Ace">Ace</li>
            <li data-val="Yuu">Yuu</li>
            <li data-val="Other">Other</li>
            <li data-val="Timeline">Timeline</li>
        </ul>
    </aside>

    <main id="archiveGrid" class="archive-grid"></main>

</div>

<!-- DETAIL -->
<div id="detailPanel" class="detail-panel hidden">
    <div class="detail-content">
        <button id="closeDetail">×</button>
        <div id="detailBody"></div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">

    <div class="modal-content">

        <form id="archiveForm">

            <input id="title" placeholder="Title" required>
            <input id="image" placeholder="Image URL">

            <select id="category">
                <option>Both</option>
                <option>Ace</option>
                <option>Yuu</option>
                <option>Other</option>
            </select>

            <input id="episode" placeholder="Episode">
            <input id="characters" placeholder="Characters">

            <textarea id="timelineSummary"></textarea>
            <textarea id="originalText"></textarea>
            <textarea id="personalAnalysis"></textarea>

            <button type="submit">Save</button>
            <button type="button" id="btnCancel">Cancel</button>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
