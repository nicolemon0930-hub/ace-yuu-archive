<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace & Yuu Archive 2.1</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

    <div class="brand">ACE & YUU ARCHIVE</div>

    <div class="actions">
        <input id="searchInput" placeholder="Search...">
        <button id="btnNew">+ New</button>
        <button id="btnExport">Export</button>
        <button id="btnImport">Import</button>
        <input type="file" id="importFile" hidden>
    </div>

</header>

<div class="layout">

    <aside class="sidebar">
        <div class="title">INDEX</div>
        <ul id="categoryFilter">
            <li data-val="Both" class="active">All</li>
            <li data-val="Ace">Ace</li>
            <li data-val="Yuu">Yuu</li>
            <li data-val="Other">Other</li>
            <li data-val="Timeline">Timeline</li>
        </ul>
    </aside>

    <main id="archiveGrid" class="list"></main>

    <section id="detailPanel" class="detail hidden">
        <button id="closeDetail">×</button>
        <div id="detailBody"></div>
    </section>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">

    <div class="modal-box">

        <h2>New Record</h2>

        <form id="archiveForm">

            <input id="title" placeholder="Title" required>
            <input id="image" placeholder="Image URL">

            <select id="category">
                <option>Both</option>
                <option>Ace</option>
                <option>Yuu</option>
                <option>Other</option>
            </select>

            <input id="episode" placeholder="Episode">
            <input id="characters" placeholder="Characters">

            <textarea id="timelineSummary" placeholder="Summary"></textarea>
            <textarea id="originalText" placeholder="Original"></textarea>
            <textarea id="personalAnalysis" placeholder="Analysis"></textarea>

            <div class="modal-actions">
                <button type="submit">Save</button>
                <button type="button" id="btnCancel">Cancel</button>
            </div>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
