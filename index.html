<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace & Yuu Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="archive-header">
        <h1>ACE & YUU ARCHIVE</h1>

        <p class="subtitle">
            An Archive of Stories, Memories and Bonds.
        </p>

        <div class="toolbar">
            <input
                type="text"
                id="searchInput"
                placeholder="Search the Archive..."
                aria-label="搜索记录">

            <button id="btnNew" class="btn-primary">
                + New Record
            </button>

            <button id="btnExport" class="btn-secondary">
                Export JSON
            </button>

            <button id="btnImport" class="btn-secondary">
                Import JSON
            </button>

            <input
                type="file"
                id="importFile"
                hidden
                accept=".json">
        </div>
    </header>

    <div class="main-container">

        <aside class="sidebar">

            <section class="filter-group">
                <h3>Archive Index</h3>

                <ul id="categoryFilter">

                    <li data-val="Both" class="active">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                        Ace & Yuu
                    </li>

                    <li data-val="Ace">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l8.84 8.84 8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                        Ace
                    </li>

                    <li data-val="Yuu">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                        Yuu
                    </li>

                    <li data-val="Other">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="9"/>
                            <path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/>
                        </svg>
                        Other Mentions
                    </li>

                    <li data-val="Timeline">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="5" cy="6" r="2"/>
                            <circle cx="5" cy="12" r="2"/>
                            <circle cx="5" cy="18" r="2"/>
                            <line x1="12" y1="6" x2="21" y2="6"/>
                            <line x1="12" y1="12" x2="21" y2="12"/>
                            <line x1="12" y1="18" x2="21" y2="18"/>
                        </svg>
                        Timeline
                    </li>

                </ul>
            </section>

        </aside>

        <main id="contentArea">

            <section id="archiveGrid" class="archive-grid">
                <!-- JS生成记录卡片 -->
            </section>

            <section id="timelineView" class="hidden">
                <!-- JS生成时间线 -->
            </section>

        </main>

    </div>

    <!-- Modal -->

    <div id="modal" class="modal hidden">

        <div class="modal-content">

            <h2 id="modalTitle">
                New Record
            </h2>

            <form id="archiveForm">

                <input
                    type="text"
                    id="title"
                    placeholder="Title"
                    required>

                <select id="category">

                    <option value="Both">
                        Ace & Yuu
                    </option>

                    <option value="Ace">
                        Ace
                    </option>

                    <option value="Yuu">
                        Yuu
                    </option>

                    <option value="Other">
                        Other Mentions
                    </option>

                </select>

                <select id="source">

                    <option value="Main Story">
                        Main Story
                    </option>

                    <option value="Event">
                        Event
                    </option>

                    <option value="Card Story">
                        Card Story
                    </option>

                    <option value="Voice">
                        Voice
                    </option>

                    <option value="Other">
                        Other
                    </option>

                </select>

                <input
                    type="text"
                    id="episode"
                    placeholder="Main-Episode 1-1">

                <input
                    type="text"
                    id="characters"
                    placeholder="Characters (Ace, Yuu, Deuce...)">

                <select id="relationshipStage">

                    <option value="">
                        Relationship Stage
                    </option>

                    <option value="初识">
                        初识
                    </option>

                    <option value="搭档">
                        搭档
                    </option>

                    <option value="信任">
                        信任
                    </option>

                    <option value="依赖">
                        依赖
                    </option>

                    <option value="特殊对待">
                        特殊对待
                    </option>

                </select>

                <textarea
                    id="timelineSummary"
                    placeholder="Timeline Summary"></textarea>

                <textarea
                    id="originalText"
                    placeholder="Original Japanese Text"></textarea>

                <textarea
                    id="objectiveNote"
                    placeholder="Objective Notes"></textarea>

                <textarea
                    id="personalAnalysis"
                    placeholder="Personal Analysis"></textarea>

                <div class="modal-actions">

                    <button type="submit">
                        Save Record
                    </button>

                    <button
                        type="button"
                        id="btnCancel">
                        Cancel
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="script.js?v=20260618"></script>

</body>
</html>
