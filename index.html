<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace & Yuu Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="archive-header">
        <h1>ACE & YUU ARCHIVE</h1>

        <p class="subtitle">
            An Archive of Stories, Memories and Bonds.
        </p>

        <div class="toolbar">
            <input
                type="text"
                id="searchInput"
                placeholder="Search the Archive..."
                aria-label="搜索记录">

            <button id="btnNew" class="btn-primary">
                + New Record
            </button>

            <button id="btnExport" class="btn-secondary">
                Export JSON
            </button>

            <button id="btnImport" class="btn-secondary">
                Import JSON
            </button>

            <input
                type="file"
                id="importFile"
                hidden
                accept=".json">
        </div>
    </header>

    <div class="main-container">

        <aside class="sidebar">

            <section class="filter-group">
                <h3>Archive Index</h3>

                <ul id="categoryFilter">

                    <li data-val="Both" class="active">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9.5-9.5C.5 7 3.5 3 7.5 3 10 3 12 5 12 5s2-2 4.5-2C20.5 3 23.5 7 21.5 11.5 19 16.5 12 21 12 21z"/></svg>
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                        Ace &amp; Yuu
                    </li>

                    <li data-val="Ace">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9.5-9.5C.5 7 3.5 3 7.5 3 10 3 12 5 12 5s2-2 4.5-2C20.5 3 23.5 7 21.5 11.5 19 16.5 12 21 12 21z"/></svg>
                        Ace
                    </li>

                    <li data-val="Yuu">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                        Yuu
                    </li>

                    <li data-val="Other">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.5 6.5L21 10l-5 4.5L17.5 22 12 18l-5.5 4L8 14.5 3 10l6.5-1.5z"/></svg>
                        Other Mentions
                    </li>

                    <li data-val="Timeline">
                        <svg class="filter-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="1.5"/><circle cx="5" cy="12" r="1.5"/><circle cx="5" cy="18" r="1.5"/><path d="M5 7.5v3M5 13.5v3M7 6h12M7 12h12M7 18h12"/></svg>
                        Timeline
                    </li>

                </ul>
            </section>

            <section class="filter-group">
                <h3>Relationship Stage</h3>
                <ul id="stageFilter" class="stage-cloud">
                    <li class="empty-note">No stages yet</li>
                </ul>
            </section>

        </aside>

        <main id="contentArea">

            <section id="archiveGrid" class="archive-grid">
                <!-- JS生成记录卡片 -->
            </section>

            <section id="timelineView" class="hidden">
                <!-- JS生成时间线 -->
            </section>

            <div class="storage-display" id="storageDisplay">
                Storage: 0.00 MB
            </div>

        </main>

    </div>

    <!-- Edit Modal -->

    <div id="modal" class="modal hidden">

        <div class="modal-content">

            <h2 id="modalTitle">
                New Record
            </h2>

            <form id="archiveForm">

                <input
                    type="text"
                    id="title"
                    placeholder="Title"
                    required>

                <select id="category">

                    <option value="Both">
                        Ace & Yuu
                    </option>

                    <option value="Ace">
                        Ace
                    </option>

                    <option value="Yuu">
                        Yuu
                    </option>

                    <option value="Other">
                        Other Mentions
                    </option>

                </select>

                <select id="source">

                    <option value="Main Story">
                        Main Story
                    </option>

                    <option value="Event">
                        Event
                    </option>

                    <option value="Card Story">
                        Card Story
                    </option>

                    <option value="Voice">
                        Voice
                    </option>

                    <option value="Other">
                        Other
                    </option>

                </select>

                <input
                    type="text"
                    id="episode"
                    placeholder="Main-Episode 1-1">

                <input
                    type="text"
                    id="characters"
                    placeholder="Characters (Ace, Yuu, Deuce...)">

                <select id="relationshipStage">

                    <option value="">
                        Relationship Stage
                    </option>

                    <option value="初识">
                        初识
                    </option>

                    <option value="搭档">
                        搭档
                    </option>

                    <option value="信任">
                        信任
                    </option>

                    <option value="依赖">
                        依赖
                    </option>

                    <option value="特殊对待">
                        特殊对待
                    </option>

                </select>

                <textarea
                    id="timelineSummary"
                    placeholder="Timeline Summary"></textarea>

                <textarea
                    id="originalText"
                    placeholder="Original Japanese Text"></textarea>

                <textarea
                    id="objectiveNote"
                    placeholder="Objective Notes"></textarea>

                <textarea
                    id="personalAnalysis"
                    placeholder="Personal Analysis"></textarea>

                <div class="image-upload">
                    <label>Cover Image</label>
                    <input type="file" id="imageInput" accept="image/*">
                    <img id="imagePreview" alt="Image Preview">
                    <button type="button" id="btnRemoveImage" class="btn-secondary">
                        Remove Image
                    </button>
                </div>

                <div class="modal-actions">

                    <button type="submit">
                        Save Record
                    </button>

                    <button
                        type="button"
                        id="btnCancel">
                        Cancel
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Detail Modal -->

    <div id="detailModal" class="modal hidden">

        <div class="modal-content">

            <div id="detailContent">
                <!-- JS生成 -->
            </div>

            <div class="detail-actions">

                <button type="button" id="btnDetailEdit" class="btn-primary">
                    Edit
                </button>

                <button type="button" id="btnDetailDelete" class="btn-danger">
                    Delete
                </button>

                <button type="button" id="btnDetailClose">
                    Close
                </button>

            </div>

        </div>

    </div>

    <script src="script.js?v=20260618"></script>

</body>
</html>
