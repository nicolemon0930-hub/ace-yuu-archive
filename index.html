<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace & Yuu Archive | 档案馆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="archive-header">
        <h1>ACE & YUU ARCHIVE</h1>
        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="在档案馆中检索记录..." aria-label="搜索记录">
            <button id="btnNew" class="btn-primary">+ 新增档案</button>
            <button id="btnExport" class="btn-secondary">导出JSON</button>
            <button id="btnImport" class="btn-secondary">导入JSON</button>
            <input type="file" id="importFile" hidden accept=".json">
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <section class="filter-group">
                <h3>分类索引</h3>
                <ul id="categoryFilter">
                    <li data-val="all" class="active">全部档案</li>
                    <li data-val="Ace">Ace 个人</li>
                    <li data-val="Yuu">Yuu 个人</li>
                    <li data-val="Both">Ace & Yuu 共演</li>
                </ul>
            </section>
        </aside>

        <main id="archiveGrid" class="archive-grid">
            </main>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">新增记录</h2>
            <form id="archiveForm">
                <input type="text" id="title" placeholder="标题" required>
                <select id="category">
                    <option value="Ace">Ace</option>
                    <option value="Yuu">Yuu</option>
                    <option value="Both">Ace & Yuu</option>
                </select>
                <textarea id="content" placeholder="记录详情..." required></textarea>
                <div class="modal-actions">
                    <button type="submit">保存至档案馆</button>
                    <button type="button" id="btnCancel">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
